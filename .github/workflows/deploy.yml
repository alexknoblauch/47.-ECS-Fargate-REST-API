# CI/CD AWS ECR direkt pipeline
name: Deploy to AWS

on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      # Build und Push in EINEM Schritt mit fertigem Action
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/ecs-fargate-test-project-image:latest     #anpassen!!
          no-cache: true
      
      # ECS Service neu starten
      - name: Deploy to ECS
        run: |                                  # anpassen!!
          aws ecs update-service --cluster ecs-fargate-test-cluster --service ecs-fargate-test-task-service-5oxgsg0u --force-new-deployment
                                  